# .github/workflows/build-ios-framework.yml
name: Build iOS Framework for FRP Client

on:
  workflow_dispatch:
    inputs:
      frp_version:
        description: 'FRP version to build (e.g., v0.37.1)'
        required: true
        default: 'v0.37.1'
      go_version:
        description: 'Go version (1.21+)'
        required: false
        default: '1.23'

jobs:
  build:
    name: Build Frpclib.framework
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go_version }}

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init -v

